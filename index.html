<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>配送・集金管理システム V200</title><style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif;background:#f4f4f4;color:#111;font-size:22px}.head{background:#1749ad;color:white;text-align:center;padding:26px 8px;font-size:32px;font-weight:900}.wrap{padding:18px}.card{background:white;border:3px solid #123d78;border-radius:12px;padding:18px;margin:16px 0;box-shadow:0 2px 8px #0002}label{font-weight:900;display:block;margin-top:14px}select,input,textarea{width:100%;font-size:28px;padding:12px;border:2px solid #777;border-radius:8px;background:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}button,.btn{border:0;border-radius:10px;padding:18px 10px;font-size:28px;font-weight:900;color:white;background:#999;text-align:center;text-decoration:none;display:block}.blue{background:#1f63e0}.green{background:#139447}.red{background:#c92a23}.dark{background:#333}.gray{background:#999}.disabled{background:#999!important;pointer-events:none;opacity:.75}.note{font-size:18px;line-height:1.5;color:#333}.admin{display:none}.admin.show{display:block}.small{font-size:18px}.modal{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;padding:18px;z-index:99}.box{background:white;border:6px solid #16428b;border-radius:18px;padding:22px;text-align:center;max-width:720px}.box h2{color:#073a75;font-size:38px;margin:0 0 18px}.box img{max-width:100%;border-radius:8px}.box .redtxt{color:#c92720;font-size:34px;font-weight:900;margin:16px}.summary{border-collapse:collapse;width:100%;background:#fff}.summary td{border:1px solid #ccc;padding:8px;font-size:20px}.summary b{font-size:24px;float:right}</style></head><body>
<div class="head">配送・集金管理システム</div><div class="wrap">
<div class="card">
<label>得意先</label><select id="customer"><option value="">選択してください</option><option value="M001">M001 株式会社松葉屋製麺</option><option value="M002">M002 株式会社アローズ</option><option value="M003">M003 株式会社カーゴジャパンアドバンスト</option><option value="M004">M004 株式会社大将</option></select>
<div class="grid"><div><label>ドライバー</label><select id="driver"><option>D001 福田</option><option>D002 岸</option><option>D003 森田</option></select></div><div><label>車両</label><select id="vehicle"><option>V001 京都480れ12-44</option><option>V002 京都481り12-46</option><option>V003 京都481り1-45</option><option>V004 京都480り94-29</option><option>V005 京都880り6-89</option></select></div></div>
<label>端末</label><select id="terminal"><option>S001 FZN1-01</option><option>S002 FZN1-02</option><option>S003 FZN1-03</option><option>S004 FZN1-04</option><option>S005 FZN1-05</option></select>
<div class="grid"><div><label>業務開始前走行距離</label><input id="startMeter" type="number" inputmode="numeric"></div><div><label>業務開始前アルコール値</label><input id="startAlcohol" type="number" inputmode="decimal" step="0.001"></div><div><label>業務終了後走行距離</label><input id="endMeter" type="number" inputmode="numeric"></div><div><label>業務終了後アルコール値</label><input id="endAlcohol" type="number" inputmode="decimal" step="0.001"></div><div><label>本日走行距離</label><input id="dailyDistance" readonly></div></div>
<div class="btns"><button id="startBtn" class="blue">業務開始</button><a id="customerBtn" class="btn gray disabled" href="#">得意先ページへ進む</a><button id="completeBtn" class="gray disabled">業務完了</button><button id="sendBtn" class="gray disabled">日報送信</button><button id="csvBtn" class="dark">CSV出力</button><button id="adminBtn" class="dark">管理者メニュー</button></div>
</div>
<div class="card"><b>■ 日報集計</b><table class="summary"><tr><td>持出件数 <b id="sCarry">0件</b></td><td>集金件数 <b id="sCollect">0件</b></td></tr><tr><td>集金なし件数 <b id="sNo">0件</b></td><td>配送完了件数 <b id="sDone">0件</b></td></tr><tr><td>集金金額 <b id="sMoney">0円</b></td><td>未配送件数 <b id="sRemain">0件</b></td></tr><tr><td>総未集金残高 <b id="sBal">0円</b></td><td>配送不可件数 <b id="sFail">0件</b></td></tr></table></div>
<div id="admin" class="card admin"><h2>管理者メニュー</h2><p class="small">店舗マスター変更はここだけ。保存すると端末内マスターへ反映。</p><label>店舗コード</label><input id="adminCode" placeholder="K0051"><label>店舗名</label><input id="adminName" placeholder="（株）京都松尾"><div class="btns"><button class="green" onclick="adminSave()">店舗追加・編集</button><button class="red" onclick="adminDelete()">店舗削除</button><button class="blue" onclick="syncMaster()">マスター同期</button><button class="dark" onclick="resetMaster()">正規51件に戻す</button></div><pre id="masterText" class="small"></pre></div>
<div class="card note">日報送信成功時のみ、点呼入力・M001/M002業務内容を削除します。未集金残高と店舗マスターは保持します。</div>
</div>
<div id="finishModal" class="modal"><div class="box"><h2>業務完了</h2><img src="complete-card.jpg" alt="お疲れ様でした"><div class="redtxt">お疲れ様でした！</div><div>本日の業務が終了しました。<br>日報送信してください。</div><div class="btns"><button class="blue" onclick="closeFinish()">閉じる</button><button id="modalSend" class="gray disabled">日報送信</button></div></div></div>
<script>
const KEY='DSV200_';const NORMAL_MASTER={"K0001":"アジョシ","K0002":"あんびしゃす花","K0003":"味鉄","K0004":"e-space","K0005":"イーサン","K0006":"岩茶坊","K0007":"えなちゃん","K0008":"075食堂","K0009":"起福","K0010":"佳久","K0011":"亀八（別）","K0012":"亀八（本）","K0013":"亀八（山）","K0014":"がぶり","K0015":"寄まっし","K0016":"京亀","K0017":"京料理藤本","K0018":"金四郎食堂","K0019":"きん平","K0020":"ことら","K0021":"幸","K0022":"鮨しん","K0023":"翠雲苑","K0024":"すぎのこ亭","K0025":"シャム","K0026":"寿海","K0027":"秀寅","K0028":"新亀","K0029":"新福菜館（伏）","K0030":"新福菜館（本）","K0031":"第一旭（寺田）","K0032":"田々","K0033":"坦々（本）","K0034":"中家","K0035":"ならび屋","K0036":"ハイカラ亭","K0037":"はなはな","K0038":"ひのき","K0039":"冨美家（工場）","K0040":"冨美家（錦）","K0041":"冨美家（本）","K0042":"まあご","K0043":"まるい食堂","K0044":"まるちゃん","K0045":"まる福","K0046":"みずき","K0047":"みつ喜","K0048":"みまでり","K0049":"よこやまろうそく","K0050":"じゅん平","K0051":"（株）京都松尾"};
function g(k,d){try{return JSON.parse(localStorage.getItem(KEY+k))??d}catch(e){return d}}function s(k,v){localStorage.setItem(KEY+k,JSON.stringify(v))}function master(){let m=g('master',null);if(!m||Object.keys(m).length<51){s('master',NORMAL_MASTER);m=NORMAL_MASTER}return m}function val(id){return document.getElementById(id).value}function setv(id,v){document.getElementById(id).value=v||''}function saveForm(){s('tenko',{customer:val('customer'),driver:val('driver'),vehicle:val('vehicle'),terminal:val('terminal'),startMeter:val('startMeter'),startAlcohol:val('startAlcohol'),endMeter:val('endMeter'),endAlcohol:val('endAlcohol'),started:g('tenko',{}).started||false,completed:g('tenko',{}).completed||false,startTime:g('tenko',{}).startTime||''}) ; calc(); update()}function loadForm(){let t=g('tenko',{});['customer','driver','vehicle','terminal','startMeter','startAlcohol','endMeter','endAlcohol'].forEach(x=>setv(x,t[x]));calc();update();renderSummary();renderMaster()}function calc(){let a=Number(val('startMeter')||0),b=Number(val('endMeter')||0);setv('dailyDistance',b&&a?Math.max(0,b-a):'')}function update(){let t=g('tenko',{}),ready=val('customer')&&val('startMeter')&&val('startAlcohol');document.getElementById('customerBtn').className='btn '+(t.started?'blue':'gray disabled');document.getElementById('customerBtn').href=t.started?(val('customer').toLowerCase()+'.html'):'#';let m=g('m001',{}),m2=g('generic',{});let done=(val('customer')==='M001'?m.workDone:m2.workDone);document.getElementById('completeBtn').className=(done&&val('endMeter')&&val('endAlcohol'))?'red':'gray disabled';document.getElementById('sendBtn').className=t.completed?'blue':'gray disabled';document.getElementById('modalSend').className=t.completed?'blue':'gray disabled';}
['customer','driver','vehicle','terminal','startMeter','startAlcohol','endMeter','endAlcohol'].forEach(id=>document.addEventListener('input',e=>{if(e.target.id===id)saveForm()}));document.getElementById('startBtn').onclick=()=>{if(!val('customer')||!val('startMeter')||!val('startAlcohol'))return alert('開始前情報を入力してください');let t=g('tenko',{});t.started=true;t.completed=false;t.startTime=t.startTime||new Date().toLocaleString('ja-JP');s('tenko',t);saveForm()};document.getElementById('completeBtn').onclick=()=>{let t=g('tenko',{});t.completed=true;t.endTime=new Date().toLocaleString('ja-JP');s('tenko',t);document.getElementById('finishModal').style.display='flex';update()};function closeFinish(){document.getElementById('finishModal').style.display='none'}document.getElementById('adminBtn').onclick=()=>document.getElementById('admin').classList.toggle('show');
function renderSummary(){let d=g('m001',{carry:[],done:[],collect:[],nocollect:[],fail:[]}),bal=g('balances',{});let money=(d.collect||[]).reduce((a,x)=>a+Number(x.amount||0),0);let balMoney=Object.values(bal).reduce((a,x)=>a+Number(x||0),0);sCarry.textContent=(d.carry||[]).length+'件';sDone.textContent=(d.done||[]).length+'件';sCollect.textContent=(d.collect||[]).length+'件';sNo.textContent=(d.nocollect||[]).length+'件';sFail.textContent=(d.fail||[]).length+'件';sRemain.textContent=(d.carry||[]).filter(x=>!(d.done||[]).some(y=>y.code===x.code)&&!(d.fail||[]).some(y=>y.code===x.code)).length+'件';sMoney.textContent=money.toLocaleString()+'円';sBal.textContent=balMoney.toLocaleString()+'円'}
function payload(){return {version:'V200-new',reportType:val('customer')==='M001'?'detailed':'generic',tenko:g('tenko',{}),m001:g('m001',{}),generic:g('generic',{}),balances:g('balances',{}),master:master()}}async function sendDaily(){let p=payload();try{let r=await fetch('./daily/receive.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});if(!r.ok)throw new Error('send');clearAfterSend();alert('日報送信しました')}catch(e){if(confirm('通信できません。送信済みとしてリセットしますか？'))clearAfterSend();}}function clearAfterSend(){let bal=g('balances',{}),mas=master();['tenko','m001','generic'].forEach(k=>localStorage.removeItem(KEY+k));s('balances',bal);s('master',mas);location.href='index.html'}sendBtn.onclick=sendDaily;modalSend.onclick=sendDaily;csvBtn.onclick=()=>{let blob=new Blob([JSON.stringify(payload(),null,2)],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='daily-v200.json';a.click()};function adminSave(){let c=val('adminCode').trim().toUpperCase(),n=val('adminName').trim();if(!/^K\d{4}$/.test(c)||!n)return alert('店舗コードと店舗名を入力');let m=master();m[c]=n;s('master',m);renderMaster();alert('保存しました')}function adminDelete(){let c=val('adminCode').trim().toUpperCase();let m=master();if(c&&confirm(c+'を削除しますか？')){delete m[c];s('master',m);renderMaster()}}function syncMaster(){localStorage.setItem(KEY+'masterSyncAt',new Date().toISOString());alert('端末内マスターを保存しました')}function resetMaster(){s('master',NORMAL_MASTER);renderMaster();alert('正規51件に戻しました')}function renderMaster(){masterText.textContent=Object.entries(master()).map(([c,n])=>c+' '+n).join('\n')}master();loadForm();
</script></body></html>
