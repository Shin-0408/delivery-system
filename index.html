<html lang="ja" manifest="offline.appcache">
<head>
<meta charset="utf-8">

<title>配送・集金管理システム V124</title>

html,body{margin:0;padding:0;background:#e9edf2;font-family:sans-serif;font-size:20px;overflow-x:hidden}
.app{width:100%;max-width:760px;margin:0 auto;background:#f7f7f7;min-height:100vh;border:0}

.boxTitle{font-size:22px;font-weight:bold;color:#003366;margin-bottom:8px}
.grid{display:grid;grid-template-columns:82px 1fr 82px 1fr;gap:8px;align-items:center}
.workGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl,label{font-weight:bold;font-size:18px}
select,input{width:100%;height:46px;font-size:22px;border:2px solid #aaa;border-radius:5px;background:#fff;padding:4px 8px;min-width:0}
input[readonly]{background:#f0f4ff;font-weight:bold}
.inputWrap{display:flex;align-items:center;gap:6px}.inputWrap span{font-weight:bold;font-size:18px}.inputWrap input{text-align:right}
.note{background:#fff4cc;border-color:#e0b44b;color:#4d3500;line-height:1.45}
.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px;background:#fff;border:2px solid #bbb;border-radius:8px;padding:10px}
.btn{height:64px;border:0;border-radius:8px;font-size:24px;font-weight:bold;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 2px 2px rgba(0,0,0,.25)}

.btn:disabled{opacity:.55;filter:grayscale(1);cursor:not-allowed}.status{font-size:18px;line-height:1.45;margin-top:8px;color:#003366;font-weight:bold}
#completeModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;align-items:center;justify-content:center;padding:18px}
.modalCard{background:#fff;border:5px solid #003366;border-radius:14px;padding:16px;width:100%;max-width:560px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.45)}
