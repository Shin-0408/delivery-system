<script>
var KEY="deliverySystemV45_";
var COMPLETE_KEY="DeliverySystemV72_businessCompleted";
var ENDPOINT="https://fukudakoken.com/daily/receive.php";
var TOKEN="FKK_DAILY_V61_20260620";
function id(x){return document.getElementById(x);}
function parse(k,d){try{var v=localStorage.getItem(KEY+k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){localStorage.setItem(KEY+k,JSON.stringify(v));}
function loadCommon(){
  var c=parse("config",{});
  ["customerCode","driverCode","vehicleCode","terminalCode"].forEach(function(k){if(c[k]&&id(k))id(k).value=c[k];});
  var w=parse("workData",{});
  ["startMeter","endMeter","startAlcohol","endAlcohol","dailyDistance"].forEach(function(k){if(id(k))id(k).value=w[k]||"";});
  calcDailyDistance();
}
function saveCommon(){
  var c={customerCode:id("customerCode").value,driverCode:id("driverCode").value,vehicleCode:id("vehicleCode").value,terminalCode:id("terminalCode").value};
  save("config",c);
  var w={startMeter:id("startMeter").value||"",endMeter:id("endMeter").value||"",startAlcohol:id("startAlcohol").value||"",endAlcohol:id("endAlcohol").value||"",dailyDistance:id("dailyDistance").value||""};
  save("workData",w);
}
function calcDailyDistance(){
  var s=Number(id("startMeter").value||0), e=Number(id("endMeter").value||0);
  id("dailyDistance").value=(!isNaN(s)&&!isNaN(e)&&e>=s)?(e-s):0;
}
function markChanged(){try{localStorage.setItem(COMPLETE_KEY,"0");}catch(e){} saveCommon(); updateMailLock();}
function updateMailLock(){
  var ok=localStorage.getItem(COMPLETE_KEY)==="1";
  id("btnMail").disabled=!ok;
  id("btnMail").style.opacity=ok?"":".45";
  id("btnMail").style.filter=ok?"":"grayscale(1)";
}
function collectAllPayload(){
  saveCommon();
  var payload={token:TOKEN,version:"V95",sentAt:new Date().toLocaleString("ja-JP"),common:parse("config",{}),workData:parse("workData",{}),
    m001:parse("m001ReportData",{}),m002:parse("m002WorkData",{}),m003:parse("m003WorkData",{}),m004:parse("m004WorkData",{}),
    legacy:{historyData:parse("historyData",[]),collectHistoryData:parse("collectHistoryData",[]),carryOutData:parse("carryOutData",[]),balanceData:parse("balanceData",{})}};
  return payload;
}
function fallbackForm(payload){
  var f=document.createElement("form");f.method="POST";f.action=ENDPOINT;f.target="_blank";f.style.display="none";
  var i=document.createElement("input");i.type="hidden";i.name="payload";i.value=JSON.stringify(payload);f.appendChild(i);document.body.appendChild(f);f.submit();
}
function sendDaily(){
  if(localStorage.getItem(COMPLETE_KEY)!=="1"){alert("先に各得意先ページで業務完了してください。");return;}
  if(!navigator.onLine){alert("通信できません。Wi-Fi接続後に日報送信してください。");return;}
  var p=collectAllPayload(), body=JSON.stringify(p), b=id("btnMail"); b.disabled=true; b.textContent="送信中...";
  fetch(ENDPOINT,{method:"POST",headers:{"Content-Type":"text/plain;charset=UTF-8"},body:body,cache:"no-store",mode:"cors"})
  .then(function(r){return r.text().then(function(t){var j={};try{j=JSON.parse(t);}catch(e){} if(!r.ok||!j.ok)throw new Error((j&&j.error)||t);return j;});})
  .then(function(j){alert("日報送信完了。\n受信時刻："+(j.receivedAt||""));})
  .catch(function(e){if(confirm("通常送信に失敗しました。別画面で送信しますか？\n"+e.message))fallbackForm(p);})
  .finally(function(){b.disabled=false;b.textContent="日報送信";updateMailLock();});
}
window.addEventListener("load",function(){
  loadCommon();
  ["customerCode","driverCode","vehicleCode","terminalCode"].forEach(function(k){id(k).addEventListener("change",markChanged);});
  ["startMeter","endMeter","startAlcohol","endAlcohol"].forEach(function(k){id(k).addEventListener("change",markChanged);id(k).addEventListener("blur",markChanged);});
  id("btnMail").onclick=sendDaily;
  id("btnResetComplete").onclick=function(){localStorage.setItem(COMPLETE_KEY,"0");updateMailLock();alert("業務完了状態を解除しました。");};
  updateMailLock();
  if("serviceWorker" in navigator){navigator.serviceWorker.register("./service-worker.js?v=95").catch(function(){});}
});
