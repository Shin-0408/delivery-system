<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>M001 松葉屋製麺 V207</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif;background:#f7f7f7;font-size:22px}.head{background:#1749ad;color:white;text-align:center;padding:24px;font-size:32px;font-weight:900}.wrap{padding:16px}.back{display:inline-block;background:#555;color:white;text-decoration:none;font-weight:900;border-radius:8px;padding:10px 18px;margin:12px 0}.card{background:white;border:3px solid #123d78;border-radius:12px;padding:16px;margin:12px 0}.notice{background:#fff4cf;border:4px solid #d6a62a;color:#765016;font-size:30px;font-weight:900;text-align:center;padding:22px;border-radius:14px}input,textarea{width:100%;font-size:30px;padding:12px;border:2px solid #777;border-radius:8px}button{border:0;border-radius:10px;color:white;font-size:26px;font-weight:900;padding:16px}button:disabled{background:#999!important;opacity:.75;color:white}.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.green{background:#15954b}.blue{background:#1f63e0}.red{background:#c92a23}.purple{background:#7b35c8}.cyan{background:#108c9a}.orange{background:#d57918}.dark{background:#333}.brown{background:#8a5a24}.wide{grid-column:1/3}.gray{background:#999}.store{font-size:34px;font-weight:900;color:#0b3970;margin:10px 0}.money{font-size:28px;font-weight:900}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.opts label{display:block;font-size:26px;font-weight:900;margin:8px 0}table{width:100%;border-collapse:collapse;background:white;font-size:18px}td,th{border:1px solid #ccc;padding:6px}h2{color:#0b3970}.summary{font-size:24px;line-height:1.7}</style></head><body><div class="head">配送・集金管理システム<br>M001 株式会社松葉屋製麺</div><div class="wrap"><a class="back" href="index.html" onclick="markDone()">点呼ページへ戻る</a><div class="card"><input id="code" placeholder="店舗コードをスキャン・入力 K0001" autocomplete="off"><div class="btns"><button class="blue" onclick="searchStore()">検索</button><button class="dark" onclick="clearSel()">取消</button></div><div id="storeBox"><div class="notice">店舗コードをスキャンしてください</div></div></div><div class="card opts"><h2>配送内容</h2><label><input type="checkbox" id="opDelivery" checked> 商品配送</label><label><input type="checkbox" id="opInvoice"> 請求書</label><label><input type="checkbox" id="opLetter"> 手紙</label><label><input type="checkbox" id="opCollectionOnly"> 集金のみ</label><label><input type="checkbox" id="opReturn"> 回収あり</label><label>請求額</label><input id="amount" type="number" inputmode="numeric" value="0"></div><div class="card"><div class="btns"><button id="btnCarry" class="green" onclick="carry()">持出</button><button id="btnUndoCarry" class="orange" onclick="undoCarry()">持出取消</button><button id="btnDeliveryDone" class="blue" onclick="deliveryDone()">配送完了</button><button id="btnDeliveryFail" class="red" onclick="deliveryFail()">配送不可</button><button id="btnCollectDone" class="purple" onclick="collectDone()">集金完了</button><button id="btnPendingCollect" class="brown" onclick="pendingCollect()">未集金</button><button id="btnNoCollect" class="cyan wide" onclick="noCollect()">集金なし</button><button id="btnCompleteWork" class="red wide" onclick="completeWork()">業務完了</button></div></div><div class="card"><h2>日報集計</h2><div class="summary" id="summary"></div></div><div class="card"><h2>持出一覧</h2><table><thead><tr><th>コード</th><th>店舗</th><th>時刻</th></tr></thead><tbody id="carryList"></tbody></table></div><div class="card"><h2>配送完了一覧</h2><table><thead><tr><th>コード</th><th>店舗</th><th>持出</th><th>配送</th><th>内容</th><th>集金</th><th>金額</th></tr></thead><tbody id="doneList"></tbody></table></div><div class="card"><h2>未集金一覧</h2><table><thead><tr><th>コード</th><th>店舗</th><th>金額</th></tr></thead><tbody id="unpaidList"></tbody></table></div><button class="dark" onclick="deleteDaily()">日報削除</button></div><script>
const KEY='DSV200_';const NORMAL_MASTER={"K0001":"アジョシ","K0002":"あんびしゃす花","K0003":"味鉄","K0004":"e-space","K0005":"イーサン","K0006":"岩茶坊","K0007":"えなちゃん","K0008":"075食堂","K0009":"起福","K0010":"佳久","K0011":"亀八（別）","K0012":"亀八（本）","K0013":"亀八（山）","K0014":"がぶり","K0015":"寄まっし","K0016":"京亀","K0017":"京料理藤本","K0018":"金四郎食堂","K0019":"きん平","K0020":"ことら","K0021":"幸","K0022":"鮨しん","K0023":"翠雲苑","K0024":"すぎのこ亭","K0025":"シャム","K0026":"寿海","K0027":"秀寅","K0028":"新亀","K0029":"新福菜館（伏）","K0030":"新福菜館（本）","K0031":"第一旭（寺田）","K0032":"田々","K0033":"坦々（本）","K0034":"中家","K0035":"ならび屋","K0036":"ハイカラ亭","K0037":"はなはな","K0038":"ひのき","K0039":"冨美家（工場）","K0040":"冨美家（錦）","K0041":"冨美家（本）","K0042":"まあご","K0043":"まるい食堂","K0044":"まるちゃん","K0045":"まる福","K0046":"みずき","K0047":"みつ喜","K0048":"みまでり","K0049":"よこやまろうそく","K0050":"じゅん平","K0051":"（株）京都松尾"};
function g(k,d){try{return JSON.parse(localStorage.getItem(KEY+k))??d}catch(e){return d}}function s(k,v){localStorage.setItem(KEY+k,JSON.stringify(v))}function master(){let m=g('master',null);if(!m||Object.keys(m).length<51){s('master',NORMAL_MASTER);m=NORMAL_MASTER}return m}function data(){let d=g('m001',null);if(!d){d={carry:[],done:[],collect:[],pending:[],nocollect:[],fail:[],workDone:false};s('m001',d)}return d}function save(d){s('m001',d);render()}function now(){return new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}function clean(v){let m=String(v||'').toUpperCase().match(/K\d{4}/);return m?m[0]:''}let current='';
function amounts(){return g('amounts',{})}
function saveAmountFor(c){if(!c)return;let a=amounts();a[c]=Number(amount.value||0);s('amounts',a)}
amount.addEventListener('input',()=>saveAmountFor(current));
function isDelivered(c){let d=data();return (d.done||[]).some(x=>x.code===c)}
function isCarried(c){let d=data();return (d.carry||[]).some(x=>x.code===c)}
function setBtn(id,on){let b=document.getElementById(id);if(b)b.disabled=!on}
function updateButtons(){let d=data();let selected=!!current, carried=selected&&isCarried(current), delivered=selected&&isDelivered(current);setBtn('btnCarry',selected&&!carried&&!delivered);setBtn('btnUndoCarry',selected&&carried&&!delivered);setBtn('btnDeliveryDone',selected&&carried&&!delivered);setBtn('btnDeliveryFail',selected&&carried&&!delivered);setBtn('btnCollectDone',selected&&delivered);setBtn('btnPendingCollect',selected&&delivered);setBtn('btnNoCollect',selected&&delivered);setBtn('btnCompleteWork',((d.carry||[]).filter(x=>!(d.done||[]).some(y=>y.code===x.code)&&!(d.fail||[]).some(y=>y.code===x.code)).length===0)&&((d.done||[]).length+(d.fail||[]).length>0))}
function searchStore(){let c=clean(code.value);let m=master();if(!m[c]){storeBox.innerHTML='<div class="notice">店舗が見つかりません</div>';current='';updateButtons();return}if((data().done||[]).some(x=>x.code===c&&x.collect)){current='';code.value=c;storeBox.innerHTML='<div class="notice">この店舗は配送済みです</div>';updateButtons();return}current=c;let bal=g('balances',{})[c]||0;let am=amounts()[c];amount.value=Number(am||0);storeBox.innerHTML='<div class="store">'+c+' '+m[c]+'</div><div class="money">前回未集金残高：'+Number(bal).toLocaleString()+'円</div>';code.value=c;updateButtons()}code.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();searchStore()}});window.addEventListener('load',()=>{code.focus();render();updateButtons()});function clearSel(){current='';code.value='';amount.value='0';opDelivery.checked=true;opInvoice.checked=false;opLetter.checked=false;opCollectionOnly.checked=false;opReturn.checked=false;storeBox.innerHTML='<div class="notice">店舗コードをスキャンしてください</div>';code.focus();updateButtons()}function need(){if(!current)searchStore();if(!current){alert('店舗を選択してください');return false}return true}function opt(){let a=[];if(opDelivery.checked)a.push('商品配送');if(opInvoice.checked)a.push('請求書');if(opLetter.checked)a.push('手紙');if(opCollectionOnly.checked)a.push('集金のみ');if(opReturn.checked)a.push('回収あり');return a.join('・')||'商品配送'}function carry(){if(!need())return;saveAmountFor(current);let d=data(),m=master();if(!d.carry.some(x=>x.code===current))d.carry.push({code:current,name:m[current],time:now(),content:opt(),amount:Number(amount.value||0)});save(d);clearSel()}function undoCarry(){if(!need())return;let d=data();d.carry=d.carry.filter(x=>x.code!==current);save(d);clearSel()}function deliveryDone(){if(!need())return;saveAmountFor(current);let d=data(),m=master(),c=d.carry.find(x=>x.code===current)||{};let amt=Number(c.amount||amount.value||0);if(!d.done.some(x=>x.code===current))d.done.push({code:current,name:m[current],carryTime:c.time||'',doneTime:now(),content:c.content||opt(),amount:amt,collect:''});save(d);storeBox.innerHTML='<div class="store">'+current+' '+m[current]+'</div><div class="notice">配送完了しました。集金完了・未集金・集金なしを選択してください</div>';updateButtons()}function deliveryFail(){if(!need())return;let reason=prompt('配送不可理由','不在')||'';let d=data(),m=master(),c=d.carry.find(x=>x.code===current)||{};d.fail.push({code:current,name:m[current],carryTime:c.time||'',time:now(),reason});d.carry=d.carry.filter(x=>x.code!==current);save(d);clearSel()}function collectDone(){if(!need())return;let d=data(),m=master(),r=d.done.find(x=>x.code===current),c=d.carry.find(x=>x.code===current)||{};let bill=Number(amount.value||r?.amount||c.amount||0);let input=prompt('集金した金額を入力してください',bill?String(bill):'');if(input===null)return;let collected=Number(String(input).replace(/[^0-9]/g,''));if(isNaN(collected)||collected<0){alert('集金金額を入力してください');return}saveAmountFor(current);let diff=Math.max(0,bill-collected),bal=g('balances',{});bal[current]=diff;s('balances',bal);d.collect.push({code:current,name:m[current],time:now(),amount:collected,billedAmount:bill,unpaidAmount:diff});if(r){r.collect=diff>0?'一部集金・未集金あり':'集金完了';r.amount=collected;r.billedAmount=bill;r.unpaidAmount=diff}else d.done.push({code:current,name:m[current],carryTime:'',doneTime:now(),content:opt(),collect:diff>0?'一部集金・未集金あり':'集金完了',amount:collected,billedAmount:bill,unpaidAmount:diff});if(diff>0)d.pending.push({code:current,name:m[current],time:now(),amount:diff,reason:'請求額との差額'});d.carry=d.carry.filter(x=>x.code!==current);save(d);clearSel()}function pendingCollect(){if(!need())return;saveAmountFor(current);let d=data(),m=master(),r=d.done.find(x=>x.code===current),c=d.carry.find(x=>x.code===current)||{};let base=Number(amount.value||r?.amount||c.amount||0);let input=prompt('未集金額を入力してください',base?String(base):'');if(input===null)return;let amt=Number(String(input).replace(/[^0-9]/g,''));if(!amt||amt<0){alert('未集金額を入力してください');return}let bal=g('balances',{});bal[current]=Number(bal[current]||0)+amt;s('balances',bal);d.pending.push({code:current,name:m[current],time:now(),amount:amt});if(r){r.collect='未集金';r.amount=amt}else d.done.push({code:current,name:m[current],carryTime:c.time||'',doneTime:now(),content:c.content||opt(),collect:'未集金',amount:amt});d.carry=d.carry.filter(x=>x.code!==current);save(d);clearSel()}function noCollect(){if(!need())return;let d=data(),m=master();d.nocollect.push({code:current,name:m[current],time:now()});let r=d.done.find(x=>x.code===current);if(r){r.collect='集金なし'}else d.done.push({code:current,name:m[current],carryTime:'',doneTime:now(),content:opt(),collect:'集金なし',amount:0});d.carry=d.carry.filter(x=>x.code!==current);save(d);clearSel()}function completeWork(){let d=data();let finished=new Set([...(d.done||[]).map(x=>x.code),...(d.fail||[]).map(x=>x.code)]);let remain=(d.carry||[]).filter(x=>!finished.has(x.code));if(remain.length>0){alert('まだ配送完了していない店舗があるので\n業務完了はできません');return}d.workDone=true;save(d);updateButtons();alert('M001業務完了。点呼ページへ戻ってください')}function markDone(){let d=data();s('m001',d)}function render(){let d=data(),bal=g('balances',{});carryList.innerHTML=d.carry.map(x=>'<tr><td>'+x.code+'</td><td>'+x.name+'</td><td>'+x.time+'</td></tr>').join('');doneList.innerHTML=d.done.map(x=>'<tr><td>'+x.code+'</td><td>'+x.name+'</td><td>'+x.carryTime+'</td><td>'+x.doneTime+'</td><td>'+x.content+'</td><td>'+(x.collect||'')+'</td><td>'+Number(x.amount||0).toLocaleString()+(Number(x.unpaidAmount||0)>0?'円（未集金 '+Number(x.unpaidAmount||0).toLocaleString()+'円）':'円')+'</td></tr>').join('');unpaidList.innerHTML=Object.entries(bal).filter(([c,a])=>Number(a)>0).map(([c,a])=>'<tr><td>'+c+'</td><td>'+master()[c]+'</td><td>'+Number(a).toLocaleString()+'円</td></tr>').join('');let money=d.collect.reduce((a,x)=>a+Number(x.amount||0),0),balMoney=Object.values(bal).reduce((a,x)=>a+Number(x||0),0);summary.innerHTML='持出件数：'+d.carry.length+'件<br>配送完了件数：'+d.done.length+'件<br>集金件数：'+d.collect.length+'件<br>集金なし件数：'+d.nocollect.length+'件<br>未集金件数：'+d.pending.length+'件<br>配送不可件数：'+d.fail.length+'件<br>本日の集金総額：'+money.toLocaleString()+'円<br>総未集金残高：'+balMoney.toLocaleString()+'円';updateButtons()}function deleteDaily(){if(confirm('本日の日報データだけ削除します。未集金残高と店舗マスターは残します。')){s('m001',{carry:[],done:[],collect:[],pending:[],nocollect:[],fail:[],workDone:false});localStorage.removeItem(KEY+'amounts');render()}}master();render();
</script></body></html>
