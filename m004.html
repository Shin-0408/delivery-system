<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>M004</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP',sans-serif;background:#f7f7f7;font-size:24px}.head{background:#1749ad;color:white;text-align:center;padding:24px;font-size:30px;font-weight:900}.wrap{padding:16px}.card{background:white;border:3px solid #123d78;border-radius:12px;padding:16px;margin:12px 0}input,textarea,select{width:100%;font-size:28px;padding:12px;border:2px solid #777;border-radius:8px}button,.back{border:0;border-radius:10px;color:white;font-size:26px;font-weight:900;padding:16px;background:#1f63e0;text-decoration:none;display:block;text-align:center;margin:10px 0}.red{background:#c92a23}.gray{background:#555}</style></head><body><div class="head">M004 株式会社大将</div><div class="wrap"><a class="back gray" href="index.html">点呼ページへ戻る</a><div class="card"><label>配送件数</label><input id="count" type="number" inputmode="numeric"><label>京都駅サポート</label><select id="support"><option>はい</option><option>いいえ</option></select><label>連絡事項</label><select id="notice"><option>はい</option><option>いいえ</option></select><textarea id="memo" rows="4" placeholder="連絡事項・備考"></textarea><button onclick="saveWork()">保存</button><button class="red" onclick="done()">業務完了</button></div></div><script>const KEY='DSV200_';const C='M004';function g(k,d){try{return JSON.parse(localStorage.getItem(KEY+k))??d}catch(e){return d}}function s(k,v){localStorage.setItem(KEY+k,JSON.stringify(v))}function load(){let all=g('generic',{}),d=all[C]||{};['count','support','notice','memo'].forEach(id=>document.getElementById(id).value=d[id]||document.getElementById(id).value)}function saveWork(){let all=g('generic',{});all[C]={customer:C,count:count.value,support:support.value,notice:notice.value,memo:memo.value,workDone:(all[C]||{}).workDone||false};all.workDone=Object.values(all).some(x=>x&&x.workDone);s('generic',all);alert('保存しました')}function done(){saveWork();let all=g('generic',{});all[C].workDone=true;all.workDone=true;s('generic',all);alert('業務完了。点呼ページへ戻ってください')}document.querySelectorAll('input,select,textarea').forEach(e=>e.oninput=saveWork);load();</script></body></html>
